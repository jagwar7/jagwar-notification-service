services:
  notification-service:
    build:
      context: . 
    container_name: notification-container
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    environment:
      # GET RABBIT CONFIG FROM .ENV
      SPRING_RABBITMQ_HOST: ${RABBIT_HOST} 
      SPRING_RABBITMQ_PORT: ${RABBIT_PORT} 
      SPRING_RABBITMQ_USERNAME: ${RABBIT_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBIT_PASSWORD}
      SPRING_RABBITMQ_VHOST: ${RABBIT_VHOST}
      
      # GET MAIL CONFIG FROM ENV
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}

      SERVER_PORT: ${SERVER_PORT}

      # RABBIT PROJECT ENVIORMENT VARIABLES
      RABBIT_EMAIL_QUEUE_NAME: ${RABBIT_EMAIL_QUEUE_NAME}
      RABBIT_EMAIL_DLQ_NAME: ${RABBIT_EMAIL_DLQ_NAME}

      RABBIT_NOTIFICATION_EXCHANGE: ${RABBIT_NOTIFICATION_EXCHANGE}
      RABBIT_DEAD_LETTER_EXCHANGE: ${RABBIT_DEAD_LETTER_EXCHANGE}

      EMAIL_ROUTING_KEY: ${EMAIL_ROUTING_KEY}
      EMAIL_DLQ_ROUTING_KEY: ${EMAIL_DLQ_ROUTING_KEY}
      
      JAVA_OPTS: "-Xmx512m -Xms256m"
      
    networks:
      - notification-network

networks:
  notification-network:
    driver: bridge