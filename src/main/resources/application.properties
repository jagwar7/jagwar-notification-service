# ==========================================================
# 1. APPLICATION SETTINGS
# ==========================================================
spring.application.name=notification-service

# ==========================================================
# 2. GETTING RABBIT CONFIGS FROM COMPOSE FILE  
# ==========================================================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${SPRING_RABBITMQ_VHOST}

spring.rabbitmq.connection-timeout=15000ms
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.ssl.enabled=false

spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=2s
spring.rabbitmq.template.retry.max-attempts=5
spring.rabbitmq.template.retry.multiplier=2.0

spring.rabbitmq.listener.simple.missing-queues-fatal=false
spring.rabbitmq.listener.simple.prefetch=1
spring.rabbitmq.listener.simple.auto-startup=true
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=2s
spring.rabbitmq.listener.simple.retry.max-attempts=5

# ==========================================================
# 3. MAIL (SMTP) CONFIGURATION
# ==========================================================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==========================================================
# 4. THYMELEAF CONFIGURATION
# ==========================================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ==========================================================
# 5. SERVER CONFIGURATION
# ==========================================================
server.port=${SERVER_PORT}

# ==========================================================
# 6. CUSTOM HIERARCHY (Matches your RabbitConfig.java @Value)
# ==========================================================
rabbitmq.queue.name=${RABBIT_QUEUE_NAME}
rabbitmq.queue.dlqName=${RABBIT_QUEUE_DLQ}
rabbitmq.notification.exchange=${NOTIFICATION_EXCHANGE}
rabbitmq.notification.dlx=${DEAD_LETTER_EXCHANGE}
rabbitmq.email.routing=${EMAIL_ROUTING}
rabbitmq.email.dlq.routing=${DLQ_ROUTING}

spring.email.sender.address=${MAIL_FROM_ADDRESS}
spring.email.sender.name=${MAIL_FROM_NAME}
# ==========================================================
# 7. LOGGING & DEBUGGING
# ==========================================================
logging.level.root=INFO
logging.level.online.connectjagwar.notification_service=DEBUG
logging.level.org.springframework.amqp=INFO
logging.level.com.fasterxml.jackson=DEBUG